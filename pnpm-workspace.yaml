packages:
  - 'apps/*'
  - 'packages/*'

# Block lifecycle scripts (preinstall/postinstall) — primary supply chain attack vector
# pnpm 10 defaults this to true; explicit for clarity (Golden Rule 10)
strictDepBuilds: true

# Supply chain security (Golden Rule 10)
# Fail install if a package's trust level dropped vs previous versions
# (e.g. previously published with provenance, now published manually)
trustPolicy: no-downgrade

# Block packages published less than 3 days ago — most supply chain attacks
# are detected within hours; this gives the community time to flag them
minimumReleaseAge: 4320 # minutes = 3 days
